services:
  postgres:
    image: postgres:16-alpine
    container_name: coffee_shop_db
    environment:
      POSTGRES_USER: ${DB_USER}          # Подставит значение из .env
      POSTGRES_PASSWORD: ${DB_PASSWORD}  # Подставит значение из .env
      POSTGRES_DB: ${DB_NAME}            # Подставит значение из .env
    ports:
      - "5444:5432"                   # Пробрасываем порт из контейнера на твой компьютер
    volumes:
      - pgdata_v2:/var/lib/postgresql/data # Папка на диске, чтобы данные не стирались при перезапуске

volumes:
  pgdata_v2: